<!DOCTYPE html>
<html>

<head>

<title>Login - Smart Bus Connect</title>

<link rel="stylesheet" href="css/style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="loginPage">

<div class="loginContainer">

<div class="loginCard">

<h2>Welcome Back</h2>

<p class="loginSubtitle">Login to Smart Bus Connect</p>

<form id="loginForm">
<input type="text" id="email" placeholder="Email or Admin Username" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit" class="primaryBtn">Login</button>

</form>

<p id="error" class="formError"></p>
<p id="success" class="formSuccess"></p>

<p class="registerText">
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

const form = document.getElementById("loginForm");

form.addEventListener("submit", async function(e){

e.preventDefault();

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();

const error = document.getElementById("error");
const success = document.getElementById("success");

error.innerText="";
success.innerText="";

try{

const response = await fetch("http://localhost:5000/api/auth/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email,
password
})

});

const data = await response.json();

if(response.ok){

success.innerText=data.message;

/* ADMIN LOGIN */

if(data.role === "admin"){

setTimeout(()=>{
window.location.href="admin/adminDashboard.html";
},1000);

}

/* USER LOGIN */

else{

localStorage.setItem("user", JSON.stringify(data.user));

setTimeout(()=>{
window.location.href="buses.html";
},1000);

}

}
else{

error.innerText=data.message;

}

}catch(err){

error.innerText="Server error. Please try again.";

}

});

});


</script>

</body>

</html>
