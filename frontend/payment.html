<!DOCTYPE html>
<html>

<head>

<title>Payment - TransitCloud</title>

<link rel="stylesheet" href="css/style.css">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body class="paymentPage">

<div class="paymentCard">

<h1>Secure Payment</h1>

<p class="paymentSubtitle">Complete your ticket booking</p>

<form id="paymentForm" class="paymentForm">

<input type="text" placeholder="Card Number" required>

<div class="paymentRow">

<input type="text" placeholder="MM/YY" required>

<input type="text" placeholder="CVV" required>

</div>

<button class="payBtn" type="submit">Pay Now</button>

</form>

<p class="secureNote">🔒 Your payment is secured with TransitCloud</p>

</div>

<script src="js/payment.js"></script>

</body>
</html>
